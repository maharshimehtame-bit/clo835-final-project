<!DOCTYPE html>
<html>
<head>
    <title>Add Employee Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: black;
            text-align: center;
            margin: 0;
            padding: 30px;
            {% if bg_path %}
            background-image: url('{{ bg_path }}');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            {% else %}
            background: {{ color }};
            {% endif %}
        }

        .container {
            background: rgba(255, 255, 255, 0.75);
            display: inline-block;
            padding: 30px;
            border-radius: 12px;
            margin-top: 30px;
        }

        input {
            height: 25px;
            font-size: 14pt;
            color: grey;
            width: 300px;
        }

        button {
            background: grey;
            height: 45px;
            width: 200px;
            color: white;
            margin: 10px;
            border: none;
            cursor: pointer;
        }

        h1 {
            color: DodgerBlue;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ app_header_name }}</h1>
        <h2>Employee Database</h2>

        <form action="/addemp" autocomplete="on" method="POST" enctype="multipart/form-data">
            Employee ID:<br>
            <input type="number" name="emp_id" autofocus><br><br>

            First Name:<br>
            <input type="text" name="first_name"><br><br>

            Last Name:<br>
            <input type="text" name="last_name"><br><br>

            Primary Skills:<br>
            <input type="text" name="primary_skill"><br><br>

            Location:<br>
            <input type="text" name="location"><br><br>

            <button type="submit">UPDATE DATABASE</button>
            <button type="submit" formaction="/getemp">GET EMPLOYEE</button>
        </form>

        <br><br>
        <a href="/about">About Us</a>
    </div>
</body>
</html>
