<!DOCTYPE html>
<html>
<head>
    <title>About</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 30px;
            color: white;
            {% if bg_path %}
            background-image: url('{{ bg_path }}');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            {% else %}
            background: {{ color }};
            {% endif %}
        }

        .container {
            background: rgba(0, 0, 0, 0.55);
            display: inline-block;
            padding: 30px;
            border-radius: 12px;
            margin-top: 40px;
        }

        textarea {
            width: 500px;
            max-width: 90%;
        }

        a {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if name %}
            <h1>Hello from {{ name }}!</h1>
        {% else %}
            <h1>Hello From CLO835!</h1>
        {% endif %}

        {% if contents %}
            <textarea rows="10" cols="50">{{ contents }}</textarea>
        {% endif %}

        <br><br>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
